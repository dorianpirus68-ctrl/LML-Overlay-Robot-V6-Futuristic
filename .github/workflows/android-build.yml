name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 35
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          yes | sdkmanager --licenses || true

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Show project files
        run: |
          pwd
          ls -la
          ls -la app || true
          find . -maxdepth 3 -type f | sort

      - name: Check Gradle
        run: gradle --version

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace --info --no-daemon || gradle assembleDebug --stacktrace --info --no-daemon

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            app/build/outputs/
            ~/.gradle/daemon/
            app/build/reports/
          retention-days: 7

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: LML-Overlay-Robot-V6-Futuristic-debug-apk
          path: app/build/outputs/apk/debug/*.apk